<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Comunicado Interno | SW Serviços</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2b7c">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Content Security Policy (CSP) - Protege contra injeção de scripts maliciosos -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self';
    ">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a2b7c 0%, #2a4f9e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; padding: 30px; }
        .header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 3px solid #1a2b7c; }
        .header h1 { color: #1a2b7c; font-size: 1.8rem; margin-bottom: 10px; }
        .header p { color: #2a4f9e; font-weight: bold; }
        .form-section { background: #f4f7fc; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .form-section h2 { color: #1a2b7c; border-left: 5px solid #1a2b7c; padding-left: 15px; margin-bottom: 20px; font-size: 1.4rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: 600; color: #333; display: block; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: 0.2s; }
        input:focus, textarea:focus { border-color: #1a2b7c; outline: none; box-shadow: 0 0 0 3px rgba(26,43,124,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 8px; }
        .checkbox-item input[type="time"] { width: auto; margin-left: auto; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; flex: 1; }
        .btn-primary { background: #1a2b7c; color: white; }
        .btn-primary:hover { background: #2a4f9e; transform: translateY(-2px); }
        .btn-img { background: #ff8c00; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .button-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .comunicado-card { background: white; border: 2px solid #1a2b7c; border-radius: 16px; padding: 25px; margin-top: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px; background: #f4f7fc; margin-bottom: 5px; border-radius: 6px; }
        .marcacoes-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .marcacoes-table th { background: #1a2b7c; color: white; padding: 10px; text-align: left; }
        .marcacoes-table td { border: 1px solid #ddd; padding: 8px; }
        .assinaturas { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 2px dashed #2a4f9e; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 20px; padding-top: 20px; border-top: 2px solid #e0e0e0; }
        .btn-close { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .container { padding: 15px; } }
    </style>
    
    <!-- html2canvas com SRI (Subresource Integrity) para garantir integridade do arquivo -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
            integrity="sha384-3Ll5M6VLG3QyA0zU9qL4tWnFv3Ei/lS2kO9Gr3l2z31W3E1BkBiWoCJ6vT6E/U0M"
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Comunicado Interno de Ocorrência</h1>
            <p>SW SERVIÇOS EM MEDICINA E SEGURANÇA DO TRABALHO LTDA</p>
            <small>CNPJ: 23.804.920/0001-68</small>
        </div>

        <form id="ocorrenciaForm">
            <div class="form-section">
                <h2>👤 Dados do Colaborador</h2>
                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" id="nomeColaborador" name="nomeColaborador" required placeholder="Digite o nome completo" autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Matrícula / CPF</label>
                    <input type="text" id="matricula" name="matricula" placeholder="Opcional" autocomplete="name">
                </div>
                <div class="form-group">
                    <label>Data da ocorrência *</label>
                    <input type="date" id="dataOcorrencia" name="dataOcorrencia" required>
                </div>
            </div>

            <div class="form-section">
                <h2>⏱️ Marcações de Ponto</h2>
                <div class="grid-2" id="marcacoesContainer">
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada1"> Entrada 1</label><input type="time" class="horario-input" data-tipo="entrada1" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida1"> Saída 1</label><input type="time" class="horario-input" data-tipo="saida1" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada2"> Entrada 2</label><input type="time" class="horario-input" data-tipo="entrada2" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida2"> Saída 2</label><input type="time" class="horario-input" data-tipo="saida2" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada3"> Entrada 3</label><input type="time" class="horario-input" data-tipo="entrada3" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida3"> Saída 3</label><input type="time" class="horario-input" data-tipo="saida3" disabled></div>
                </div>
            </div>

            <div class="form-section">
                <h2>⚠️ Tipo de Ocorrência</h2>
                <div class="radio-group">
                    <label><input type="radio" name="tipoOcorrencia" value="inclusao" required> Inclusão</label>
                    <label><input type="radio" name="tipoOcorrencia" value="exclusao"> Exclusão</label>
                    <label><input type="radio" name="tipoOcorrencia" value="outro"> Outro</label>
                </div>
                <div class="form-group" id="outroJustificativa" style="display: none;">
                    <label>Justificativa:</label>
                    <input type="text" id="justificativaOutro" placeholder="Descreva a ocorrência">
                </div>
            </div>

            <div class="form-section">
                <h2>📝 Observações</h2>
                <textarea id="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
            </div>
            <div class="form-section">
                <h2>✍️ Assinaturas</h2>
                <div class="grid-2">
                    <div class="form-group"><label>Responsável (RH/Supervisor):</label><input type="text" id="responsavel" required placeholder="Nome do responsável" autocomplete="name"></div>
                    <div class="form-group"><label>Colaborador:</label><input type="text" id="colaboradorAssinatura" required placeholder="Nome do colaborador" autocomplete="name"></div>
                </div>
            </div>

            <div class="button-group">
                <button type="button" id="previewBtn" class="btn btn-primary">👁️ Visualizar Comunicado</button>
                <button type="button" id="gerarImagemBtn" class="btn btn-img">🖼️ Salvar como Imagem</button>
                <button type="reset" class="btn btn-secondary">🗑️ Limpar Formulário</button>
            </div>
        </form>

        <div id="previewArea" style="display:none;">
            <div class="preview-header">
                <h2>📄 Visualização do Comunicado</h2>
                <button id="fecharPreview" class="btn-close">✖️ Fechar</button>
            </div>
            <div id="comunicadoContent"></div>
        </div>
    </div>

    <script>
        (function() {
            console.log('🚀 App inicializando (versão segura)...');
            
            // ==================== FUNÇÃO DE SANITIZAÇÃO (PROTEÇÃO XSS) ====================
            /**
             * Sanitiza texto para prevenir injeção de código malicioso (XSS)
             * Converte caracteres especiais em entidades HTML
             */
            function sanitizar(texto) {
                if (!texto) return '';
                // Converte string para texto puro e depois para HTML seguro
                const div = document.createElement('div');
                div.textContent = texto;
                return div.innerHTML;
            }
            
            // ==================== INICIALIZAÇÃO ====================
            document.addEventListener('DOMContentLoaded', function() {
                console.log('✅ DOM carregado');
                
                // Data atual
                const dataInput = document.getElementById('dataOcorrencia');
                if (dataInput) {
                    dataInput.value = new Date().toISOString().split('T')[0];
                }
                
                // Controle de horários
                const checkboxes = document.querySelectorAll('.marcacao-check');
                function atualizarHorario(checkbox) {
                    const tipo = checkbox.getAttribute('data-tipo');
                    const horarioInput = document.querySelector(`.horario-input[data-tipo="${tipo}"]`);
                    if (horarioInput) {
                        if (checkbox.checked) {
                            horarioInput.disabled = false;
                            if (!horarioInput.value) horarioInput.value = '08:00';
                        } else {
                            horarioInput.disabled = true;
                            horarioInput.value = '';
                        }
                    }
                }
                checkboxes.forEach(cb => {
                    atualizarHorario(cb);
                    cb.addEventListener('change', () => atualizarHorario(cb));
                });
                
                // Campo "Outro"
                const radioOutro = document.querySelector('input[value="outro"]');
                const radioInclusao = document.querySelector('input[value="inclusao"]');
                const radioExclusao = document.querySelector('input[value="exclusao"]');
                const outroDiv = document.getElementById('outroJustificativa');
                const justificativaOutro = document.getElementById('justificativaOutro');
                function toggleOutro() {
                    if (radioOutro && radioOutro.checked) {
                        outroDiv.style.display = 'block';
                        if (justificativaOutro) justificativaOutro.required = true;
                    } else {
                        outroDiv.style.display = 'none';
                        if (justificativaOutro) { justificativaOutro.required = false; justificativaOutro.value = ''; }
                    }
                }
                if (radioOutro) {
                    radioOutro.addEventListener('change', toggleOutro);
                    if (radioInclusao) radioInclusao.addEventListener('change', toggleOutro);
                    if (radioExclusao) radioExclusao.addEventListener('change', toggleOutro);
                    toggleOutro();
                }
                
                // ==================== COLETA DE DADOS ====================
                function coletarDados() {
                    const marcacoes = [];
                    const tipos = ['entrada1', 'saida1', 'entrada2', 'saida2', 'entrada3', 'saida3'];
                    const nomes = { entrada1:'Entrada 1', saida1:'Saída 1', entrada2:'Entrada 2', saida2:'Saída 2', entrada3:'Entrada 3', saida3:'Saída 3' };
                    tipos.forEach(tipo => {
                        const checkbox = document.querySelector(`.marcacao-check[data-tipo="${tipo}"]`);
                        const horarioInput = document.querySelector(`.horario-input[data-tipo="${tipo}"]`);
                        if (checkbox && checkbox.checked && horarioInput && horarioInput.value) {
                            marcacoes.push({ tipo: nomes[tipo], horario: horarioInput.value });
                        }
                    });
                    let tipoOcorrencia = '', justificativa = '';
                    const radioSel = document.querySelector('input[name="tipoOcorrencia"]:checked');
                    if (radioSel) {
                        if (radioSel.value === 'inclusao') tipoOcorrencia = 'Inclusão';
                        else if (radioSel.value === 'exclusao') tipoOcorrencia = 'Exclusão';
                        else if (radioSel.value === 'outro') { tipoOcorrencia = 'Outro'; justificativa = justificativaOutro?.value || ''; }
                    }
                    return {
                        nomeColaborador: document.getElementById('nomeColaborador')?.value || '',
                        matricula: document.getElementById('matricula')?.value || '',
                        dataOcorrencia: document.getElementById('dataOcorrencia')?.value || '',
                        marcacoes, tipoOcorrencia, justificativa,
                        observacoes: document.getElementById('observacoes')?.value || '',
                        responsavel: document.getElementById('responsavel')?.value || '',
                        colaboradorAssinatura: document.getElementById('colaboradorAssinatura')?.value || ''
                    };
                }
                
                function validarDados(dados) {
                    if (!dados.nomeColaborador) { alert('❌ Preencha o nome do colaborador'); return false; }
                    if (!dados.dataOcorrencia) { alert('❌ Selecione a data da ocorrência'); return false; }
                    if (!dados.tipoOcorrencia) { alert('❌ Selecione o tipo de ocorrência'); return false; }
                    if (dados.tipoOcorrencia === 'Outro' && !dados.justificativa) { alert('❌ Preencha a justificativa'); return false; }
                    if (!dados.responsavel) { alert('❌ Preencha o nome do responsável'); return false; }
                    if (!dados.colaboradorAssinatura) { alert('❌ Preencha o nome do colaborador'); return false; }
                    return true;
                }
                
                function formatarData(dataString) {
                    if (!dataString) return '___/___/_____';
                    const partes = dataString.split('-');
                    return partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : dataString;
                }
                
                // ==================== GERAÇÃO DE HTML SEGURO (SEM XSS) ====================
                function gerarComunicadoHTML(dados) {
                    const dataFormatada = formatarData(dados.dataOcorrencia);
                    
                    // Sanitiza dados ANTES de montar o HTML
                    const nomeColaboradorSanitizado = sanitizar(dados.nomeColaborador);
                    const matriculaSanitizada = sanitizar(dados.matricula);
                    const dataFormatadaSanitizada = sanitizar(dataFormatada);
                    const tipoOcorrenciaSanitizado = sanitizar(dados.tipoOcorrencia);
                    const justificativaSanitizada = sanitizar(dados.justificativa);
                    const observacoesSanitizadas = sanitizar(dados.observacoes);
                    const responsavelSanitizado = sanitizar(dados.responsavel);
                    const colaboradorAssinaturaSanitizado = sanitizar(dados.colaboradorAssinatura);
                    const dataGeracaoSanitizada = sanitizar(new Date().toLocaleString('pt-BR'));
                    
                    let marcacoesHTML = dados.marcacoes.length > 0 ? `
                        <table class="marcacoes-table">
                            <thead><tr><th>Horário</th><th>Registro</th></tr></thead>
                            <tbody>${dados.marcacoes.map(m => `<tr><td>${sanitizar(m.tipo)}</td><td>${sanitizar(m.horario)}</td>`).join('')}</tbody>
                        </table>
                    ` : '<p style="text-align:center; color:#999;">Nenhuma marcação de ponto registrada.</p>';
                    
                    return `
                        <div class="comunicado-card" id="comunicadoParaExportar">
                            <div style="text-align:center; border-bottom:2px solid #1a2b7c; padding-bottom:15px; margin-bottom:20px;">
                                <h2 style="color:#1a2b7c;">COMUNICADO INTERNO DE OCORRÊNCIA</h2>
                                <p style="color:#2a4f9e; font-weight:bold;">SW SERVIÇOS EM MEDICINA E SEGURANÇA DO TRABALHO LTDA</p>
                                <small>CNPJ: 23.804.920/0001-68</small>
                            </div>
                            <div class="info-row"><strong>Colaborador:</strong> <span>${nomeColaboradorSanitizado}</span></div>
                            ${dados.matricula ? `<div class="info-row"><strong>Matrícula/CPF:</strong> <span>${matriculaSanitizada}</span></div>` : ''}
                            <div class="info-row"><strong>Data da Ocorrência:</strong> <span>${dataFormatadaSanitizada}</span></div>
                            <div class="info-row"><strong>Tipo de Ocorrência:</strong> <span>${tipoOcorrenciaSanitizado}${dados.justificativa ? ` - ${justificativaSanitizada}` : ''}</span></div>
                            <h3 style="margin:20px 0 10px; color:#1a2b7c;">⏱️ Marcações de Ponto</h3>
                            ${marcacoesHTML}
                            ${dados.observacoes ? `<h3 style="margin:20px 0 10px; color:#1a2b7c;">📝 Observações</h3><div class="info-row">${observacoesSanitizadas}</div>` : ''}
                            <div class="assinaturas">
                                <div><strong>Responsável:</strong><br>${responsavelSanitizado}</div>
                                <div><strong>Colaborador:</strong><br>${colaboradorAssinaturaSanitizado}</div>
                            </div>
                            <div style="text-align:center; font-size:10px; color:#999; margin-top:20px;">
                                Documento gerado eletronicamente em ${dataGeracaoSanitizada}
                            </div>
                        </div>
                    `;
                }
                
                // ==================== EVENTOS ====================
                const previewArea = document.getElementById('previewArea');
                const comunicadoContent = document.getElementById('comunicadoContent');
                
                // Visualizar Preview
                document.getElementById('previewBtn').addEventListener('click', function() {
                    const dados = coletarDados();
                    if (!validarDados(dados)) return;
                    comunicadoContent.innerHTML = gerarComunicadoHTML(dados);
                    previewArea.style.display = 'block';
                    previewArea.scrollIntoView({ behavior: 'smooth' });
                });
                
                // Fechar Preview
                document.getElementById('fecharPreview').addEventListener('click', () => previewArea.style.display = 'none');
                
                // Gerar Imagem
                document.getElementById('gerarImagemBtn').addEventListener('click', async function() {
                    const dados = coletarDados();
                    if (!validarDados(dados)) return;
                    
                    // Mostra o preview primeiro
                    comunicadoContent.innerHTML = gerarComunicadoHTML(dados);
                    previewArea.style.display = 'block';
                    
                    const btn = this;
                    const originalText = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = '⏳ Gerando imagem...';
                    
                    try {
                        // Aguarda o preview renderizar
                        await new Promise(r => setTimeout(r, 200));
                        
                        const element = document.querySelector('#comunicadoParaExportar');
                        if (!element) throw new Error('Elemento não encontrado');
                        
                        const canvas = await html2canvas(element, { 
                            scale: 2, 
                            backgroundColor: '#ffffff',
                            logging: false 
                        });
                        
                        const link = document.createElement('a');
                        link.download = `Comunicado_${dados.nomeColaborador.replace(/\s/g, '_')}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        
                        alert('✅ Imagem gerada com sucesso!');
                    } catch (error) {
                        console.error('Erro:', error);
                        alert('❌ Erro ao gerar imagem: ' + error.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                });
                
                // Botão reset
                document.querySelector('button[type="reset"]').addEventListener('click', function() {
                    setTimeout(() => {
                        document.querySelectorAll('.marcacao-check').forEach(cb => {
                            const tipo = cb.getAttribute('data-tipo');
                            const hi = document.querySelector(`.horario-input[data-tipo="${tipo}"]`);
                            if (hi) { hi.disabled = true; hi.value = ''; }
                        });
                        if (outroDiv) outroDiv.style.display = 'none';
                        if (previewArea) previewArea.style.display = 'none';
                        if (dataInput) dataInput.value = new Date().toISOString().split('T')[0];
                    }, 10);
                });
                
                console.log('✅ App pronto (versão segura contra XSS)!');
            });
        })();
    </script>
</body>
</html>
