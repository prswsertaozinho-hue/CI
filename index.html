<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Comunicado Interno | Premium Saúde Ocupacional</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2b7c">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://premiumsaudeocupacional.com.br/wp-content/uploads/2023/08/logo-premium.png" alt="Logo Premium Saúde Ocupacional" class="logo" onerror="this.style.display='none'">
            <h1>📋 Comunicado Interno de Ocorrência</h1>
            <p>SW SERVIÇOS EM MEDICINA E SEGURANÇA DO TRABALHO LTDA</p>
            <small>CNPJ: 23.804.920/0001-68 | Sob a gestão da PREMIUM Saúde Ocupacional</small>
        </div>

        <form id="ocorrenciaForm">
            <!-- Dados do Colaborador -->
            <div class="form-section">
                <h2>👤 Dados do Colaborador</h2>
                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" id="nomeColaborador" required>
                </div>
                <div class="form-group">
                    <label>Matrícula / CPF</label>
                    <input type="text" id="matricula">
                </div>
                <div class="form-group">
                    <label>Data da ocorrência *</label>
                    <input type="date" id="dataOcorrencia" required>
                </div>
            </div>

            <!-- Marcações de Ponto -->
            <div class="form-section">
                <h2>⏱️ Marcações de Ponto</h2>
                <div class="grid-2">
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada1"> Entrada 1</label><input type="time" class="horario-input" data-tipo="entrada1" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida1"> Saída 1</label><input type="time" class="horario-input" data-tipo="saida1" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada2"> Entrada 2</label><input type="time" class="horario-input" data-tipo="entrada2" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida2"> Saída 2</label><input type="time" class="horario-input" data-tipo="saida2" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="entrada3"> Entrada 3</label><input type="time" class="horario-input" data-tipo="entrada3" disabled></div>
                    <div class="checkbox-item"><label><input type="checkbox" class="marcacao-check" data-tipo="saida3"> Saída 3</label><input type="time" class="horario-input" data-tipo="saida3" disabled></div>
                </div>
            </div>

            <!--  Tipo de Ocorrência -->
            <div class="form-section">
                <h2>⚠️Tipo de Ocorrência</h2>
                <div class="radio-group">
                    <label><input type="radio" name="tipoOcorrencia" value="inclusao" required> Inclusão</label>
                    <label><input type="radio" name="tipoOcorrencia" value="exclusao"> Exclusão</label>
                    <label><input type="radio" name="tipoOcorrencia" value="outro"> Outro</label>
                </div>
                <div class="form-group" id="outroJustificativa" style="display:none;">
                    <label>Justificativa:</label>
                    <input type="text" id="justificativaOutro" placeholder="Descreva a ocorrência">
                </div>
            </div>

            <!-- Observações e Assinaturas -->
            <div class="form-section">
                <h2>📝 Observações</h2>
                <textarea id="observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
            </div>
            <div class="form-section">
                <h2>✍️ Assinaturas</h2>
                <div class="grid-2">
                    <div class="form-group"><label>Responsável (RH/Supervisor):</label><input type="text" id="responsavel" required></div>
                    <div class="form-group"><label>Colaborador:</label><input type="text" id="colaboradorAssinatura" required></div>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="button-group">
                <button type="button" id="previewBtn" class="btn btn-primary">👁️ Visualizar</button>
                <button type="button" id="gerarPdfBtn" class="btn btn-pdf">📄 Gerar PDF</button>
                <button type="button" id="gerarImagemBtn" class="btn btn-img">🖼️ Salvar Imagem</button>
                <button type="reset" class="btn btn-secondary">🗑️ Limpar</button>
            </div>
        </form>

        <div id="previewArea" style="display:none;">
            <div class="preview-header"><h2>📄 Visualização</h2><button id="fecharPreview" class="btn-close">✖️ Fechar</button></div>
            <div id="comunicadoContent"></div>
        </div>
    </div>
    <script src="sw-install.js"></script>
    <script src="script.js"></script>
</body>
</html>
